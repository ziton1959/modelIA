services:

 postgres:
  image: postgres:16-alpine
  container_name: if-postgres
  restart: unless-stopped
  environment:
    POSTGRES_DB: imagefactory
    POSTGRES_USER: imagefactory
    POSTGRES_PASSWORD: strongpassword
    PGDATA: /var/lib/postgresql/data/pgdata
  volumes:
    - postgres_data:/var/lib/postgresql/data
  ports:
    - "5432:5432"
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U imagefactory -d imagefactory"]
    interval: 10s
    timeout: 5s
    retries: 5

 minio:
   image: minio/minio:latest
   container_name: if-minio
   restart: unless-stopped
   environment:
     MINIO_ROOT_USER: minioadmin
     MINIO_ROOT_PASSWORD: minioadmin123
   volumes:
     - minio_data:/data
   ports:
     - "9000:9000"
     - "9001:9001"
   command: server /data --console-address ":9001"
   healthcheck:
     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
     interval: 10s
     timeout: 5s
     retries: 5

 ollama:
   image: if-ollama-custom:latest
   container_name: if-ollama
   restart: unless-stopped
   environment:
     HTTP_PROXY: http://10.93.144.53:8080
     HTTPS_PROXY: http://10.93.144.53:8080
     NO_PROXY: localhost,127.0.0.1,postgres,minio,api
     http_proxy: http://10.93.144.53:8080
     https_proxy: http://10.93.144.53:8080
     no_proxy: localhost,127.0.0.1,postgres,minio,api
     OLLAMA_SKIP_TLS_VERIFY: "true"
     OLLAMA_DEBUG: "1"
   volumes:
     - ollama_data:/root/.ollama
   ports:
     - "11434:11434"
   healthcheck:
     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
     interval: 30s
     timeout: 10s
     retries: 5

volumes:
  postgres_data:
  minio_data:
  ollama_data:
