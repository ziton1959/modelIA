services:
  postgres:
    image: postgres:16
    container_name: imagefactory_postgres
    restart: always
    environment:
      POSTGRES_USER: imagefactory
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: imagefactory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: imagefactory_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
