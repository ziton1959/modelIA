---
- name: Base image configuration
  hosts: all
  become: true
  environment:
    http_proxy: "http://10.93.144.53:8080"
    https_proxy: "http://10.93.144.53:8080"
    no_proxy: "localhost,127.0.0.1"

  vars:
    packages: []

    package_name_map:
      docker: docker.io
      python: python3
      python3: python3
      "python3.12": python3
      pip: python3-pip
      node: nodejs
      nodejs: nodejs

  tasks:
    - name: Configure apt to use corporate proxy
      copy:
        dest: /etc/apt/apt.conf.d/00proxy
        content: |
          Acquire::http::Proxy "http://10.93.144.53:8080";
          Acquire::https::Proxy "http://10.93.144.53:8080";
    
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - htop
          - vim
        state: present

    - name: Translate requested packages to real apt names
      set_fact:
        final_packages: "{{ final_packages | default([]) + [ package_name_map[item | lower] | default(item) ] }}"
      loop: "{{ packages }}"

    - name: Install requested packages
      apt:
        name: "{{ final_packages }}"
        state: present
      when: final_packages | default([]) | length > 0

    - name: Clean apt cache
      apt:
        autoclean: yes
        autoremove: yes