---
- name: Base image configuration
  hosts: all
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - htop
          - vim
        state: present

    - name: Clean apt cache
      apt:
        autoclean: yes
        autoremove: yes
